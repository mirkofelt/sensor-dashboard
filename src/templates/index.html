<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sensordaten</title>
<script src="/static/js/chart.umd.min.js"></script>
<script src="/static/js/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
  :root {
    --bg: #0f1117; --card: #1a1d27; --border: #2a2d3a;
    --text: #e2e8f0; --muted: #8892a4; --accent: #4f9cf9;
    --warm: #f97316; --cool: #22d3ee; --green: #4ade80;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; padding: 1.5rem; }
  h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 1.5rem; color: var(--accent); }
  h2 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: .75rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: .75rem; margin-bottom: 1.5rem; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: .9rem 1rem; }
  .card .room { font-size: .75rem; color: var(--muted); margin-bottom: .35rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card .temp { font-size: 1.6rem; font-weight: 700; line-height: 1; }
  .card .hum  { font-size: .8rem; color: var(--muted); margin-top: .25rem; }
  .chart-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 1.25rem; margin-bottom: 1.5rem; }
  .range-btns { display: flex; gap: .5rem; margin-bottom: 1rem; }
  .range-btns button { background: var(--border); border: none; color: var(--muted); padding: .3rem .75rem; border-radius: 6px; cursor: pointer; font-size: .8rem; }
  .range-btns button.active { background: var(--accent); color: #fff; }
  .vent-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: .75rem; margin-bottom: 1.5rem; }
  .vent-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: .9rem 1rem; }
  .vent-card .label { font-size: .75rem; color: var(--muted); margin-bottom: .35rem; }
  .vent-card .val { font-size: 1.4rem; font-weight: 700; }
  .vent-card .sub { font-size: .8rem; color: var(--muted); margin-top: .2rem; }
  .updated { font-size: .7rem; color: var(--muted); margin-top: .5rem; }
  canvas { max-height: 260px; }
  .e-pv      { border-top: 3px solid #facc15; }
  .e-last    { border-top: 3px solid #f43f5e; }
  .e-bezug   { border-top: 3px solid #f97316; }
  .e-einsp   { border-top: 3px solid #4ade80; }
  .e-laden   { border-top: 3px solid #4f9cf9; }
  .e-entladen{ border-top: 3px solid #a855f7; }
  .stream-abluft    { border-top: 3px solid #f97316; }
  .stream-fortluft  { border-top: 3px solid #a855f7; }
  .stream-aussenluft{ border-top: 3px solid #22d3ee; }
  .stream-zuluft    { border-top: 3px solid #4ade80; }
  .series-selector { margin-bottom: 1rem; }
  .series-group { margin-bottom: .6rem; }
  .series-group-label { font-size: .7rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: .35rem; }
  .series-chips { display: flex; flex-wrap: wrap; gap: .35rem; }
  .chip { background: var(--border); border: none; color: var(--muted); padding: .25rem .6rem; border-radius: 20px; cursor: pointer; font-size: .75rem; transition: background .15s, color .15s; }
  .chip.active { color: #fff; }
  .export-btns { display: flex; gap: .5rem; margin-top: .75rem; justify-content: flex-end; }
  .export-btns button { background: var(--border); border: none; color: var(--muted); padding: .25rem .65rem; border-radius: 6px; cursor: pointer; font-size: .75rem; }
  .export-btns button:hover { color: var(--text); }
</style>
</head>
<body>
<h1>🏠 Sensordaten</h1>

<h2>Aktuelle Raumtemperaturen</h2>
<div class="grid" id="rooms-grid"></div>

<h2>Verlauf Raumtemperaturen</h2>
<div class="chart-wrap">
  <div class="range-btns" id="room-range">
    <button data-r="6h">6h</button>
    <button data-r="24h" class="active">24h</button>
    <button data-r="7d">7d</button>
  </div>
  <canvas id="room-chart"></canvas>
</div>

<h2>Energie</h2>
<div class="vent-grid" id="energie-grid"></div>

<h2>Verlauf Energie</h2>
<div class="chart-wrap">
  <div class="range-btns" id="energie-range">
    <button data-r="6h">6h</button>
    <button data-r="24h" class="active">24h</button>
    <button data-r="7d">7d</button>
  </div>
  <canvas id="energie-chart"></canvas>
</div>

<h2>Verbraucher</h2>
<div class="vent-grid" id="verbraucher-grid"></div>

<h2>Verlauf Verbraucher</h2>
<div class="chart-wrap">
  <div class="range-btns" id="verbraucher-range">
    <button data-r="6h">6h</button>
    <button data-r="24h" class="active">24h</button>
    <button data-r="7d">7d</button>
  </div>
  <canvas id="verbraucher-chart"></canvas>
</div>

<h2>ComfoClime 24</h2>
<div class="vent-grid" id="cool24-grid"></div>

<h2>Verlauf ComfoClime</h2>
<div class="chart-wrap">
  <div class="range-btns" id="cool24-range">
    <button data-r="6h">6h</button>
    <button data-r="24h" class="active">24h</button>
    <button data-r="7d">7d</button>
  </div>
  <canvas id="cool24-chart"></canvas>
</div>

<h2>Lüftungsanlage</h2>
<div class="vent-grid" id="vent-grid"></div>

<h2>Verlauf Lüftung</h2>
<div class="chart-wrap">
  <div class="range-btns" id="vent-range">
    <button data-r="6h">6h</button>
    <button data-r="24h" class="active">24h</button>
    <button data-r="7d">7d</button>
  </div>
  <canvas id="vent-chart"></canvas>
</div>

<h2>Vergleich</h2>
<div class="chart-wrap">
  <div class="range-btns" id="cmp-range">
    <button data-r="6h">6h</button>
    <button data-r="24h" class="active">24h</button>
    <button data-r="7d">7d</button>
  </div>
  <div class="series-selector" id="series-selector"></div>
  <canvas id="cmp-chart"></canvas>
  <div class="export-btns">
    <button onclick="exportChart('png')">↓ PNG</button>
    <button onclick="exportChart('svg')">↓ SVG</button>
  </div>
</div>

<div class="updated" id="updated"></div>

<script>
function timeXAxis(range) {
  const is7d = range === '7d';
  return {
    type: 'time',
    time: {
      unit: is7d ? 'day' : 'hour',
      displayFormats: { hour: 'HH:mm', day: 'dd.MM.' },
    },
    ticks: {
      color: '#8892a4',
      maxRotation: 0,
      maxTicksLimit: is7d ? 8 : 7,
    },
    grid: { color: '#2a2d3a' },
  };
}

const ROOM_COLORS = [
  '#4f9cf9','#f97316','#4ade80','#f43f5e','#a855f7',
  '#22d3ee','#facc15','#fb7185','#34d399','#818cf8','#f472b6','#64748b'
];
const VENT_COLORS = {
  abluft: '#f97316', fortluft: '#a855f7', aussenluft: '#22d3ee', zuluft: '#4ade80'
};
const VENT_LABELS = {
  abluft: 'Abluft (Haus→)', fortluft: 'Fortluft (→außen)', aussenluft: 'Außenluft (→Haus)', zuluft: 'Zuluft (→Räume)'
};
const ENERGIE_COLORS = {
  pv_w: '#facc15', verbrauch_w: '#f43f5e', bezug_w: '#f97316',
  einspeisung_w: '#4ade80', laden_w: '#4f9cf9', entladen_w: '#a855f7',
};
const ENERGIE_LABELS = {
  pv_w: 'PV Erzeugung', verbrauch_w: 'Verbrauch', bezug_w: 'Netzbezug',
  einspeisung_w: 'Einspeisung', laden_w: 'Batterie laden', entladen_w: 'Batterie entladen',
};
const ENERGIE_CHART_FIELDS = ['pv_w','verbrauch_w','bezug_w','einspeisung_w','laden_w','entladen_w'];

const VERBRAUCHER_KNOWN_LABELS = {
  boiler1_aktiv: 'Boiler 1', boiler2_aktiv: 'Boiler 2',
  ir_heizer_gesamt_aktiv: 'IR-Heizer (ges.)',
  waschmaschine_aktiv: 'Waschmaschine', lueftungsanlage_aktiv: 'Lüftungsanlage',
};
const VERBRAUCHER_SORT_ORDER = ['boiler1_aktiv','boiler2_aktiv','waschmaschine_aktiv','lueftungsanlage_aktiv','ir_heizer_gesamt_aktiv'];
const VERBRAUCHER_COLOR_POOL = ['#4f9cf9','#22d3ee','#f97316','#a855f7','#4ade80','#facc15','#f43f5e','#fb7185','#34d399','#818cf8','#f472b6','#64748b'];

function _verbraucherLabel(f) {
  if (VERBRAUCHER_KNOWN_LABELS[f]) return VERBRAUCHER_KNOWN_LABELS[f];
  if (f.endsWith('_ir_aktiv')) {
    const r = f.slice(0, -9).replace(/_/g, ' ');
    return r.charAt(0).toUpperCase() + r.slice(1) + ' (IR)';
  }
  if (f.endsWith('_fussbodenheizung')) {
    const r = f.slice(0, -17).replace(/_/g, ' ');
    return r.charAt(0).toUpperCase() + r.slice(1) + ' (FBH)';
  }
  return f.replace(/_/g, ' ');
}

function _sortVerbraucher(fields) {
  return [...fields].sort((a, b) => {
    const ai = VERBRAUCHER_SORT_ORDER.indexOf(a), bi = VERBRAUCHER_SORT_ORDER.indexOf(b);
    if (ai >= 0 && bi >= 0) return ai - bi;
    if (ai >= 0) return -1;
    if (bi >= 0) return 1;
    return a.localeCompare(b);
  });
}

const COOL24_TEMP_FIELDS = ['indoor_temp_c','outdoor_temp_c','tpma_temp_c','supply_temp_c','exhaust_temp_c'];
const COOL24_COLORS = {
  indoor_temp_c: '#4f9cf9', outdoor_temp_c: '#22d3ee',
  tpma_temp_c: '#f97316', supply_temp_c: '#4ade80', exhaust_temp_c: '#a855f7',
};
const COOL24_LABELS = {
  indoor_temp_c: 'Innenraum', outdoor_temp_c: 'Außen',
  tpma_temp_c: 'TPMA', supply_temp_c: 'Zuluft (nach WP)', exhaust_temp_c: 'Abluft',
};

let roomChart = null, ventChart = null, energieChart = null, verbraucherChart = null, cool24Chart = null, cmpChart = null;
let roomRange = '24h', ventRange = '24h', energieRange = '24h', verbraucherRange = '24h', cool24Range = '24h', cmpRange = '24h';

const CMP_COLORS = [
  '#4f9cf9','#f97316','#4ade80','#f43f5e','#a855f7',
  '#22d3ee','#facc15','#fb7185','#34d399','#818cf8','#f472b6','#64748b'
];

const DEFAULT_SERIES = ['lueftung:aussenluft:temp', 'lueftung:abluft:temp'];
let selectedSeries = new Set(DEFAULT_SERIES);
let allSeriesMeta = [];

async function loadSeriesMeta() {
  allSeriesMeta = await fetch('/api/series').then(r => r.json());
  renderSeriesSelector();
  loadCompare(cmpRange);
}

function renderSeriesSelector() {
  const container = document.getElementById('series-selector');
  const groups = {};
  allSeriesMeta.forEach(s => {
    if (!groups[s.group]) groups[s.group] = [];
    groups[s.group].push(s);
  });

  container.innerHTML = Object.entries(groups).map(([grp, items]) => `
    <div class="series-group">
      <div class="series-group-label">${grp}</div>
      <div class="series-chips">
        ${items.map(s => {
          const active = selectedSeries.has(s.id) ? 'active' : '';
          const color = selectedSeries.has(s.id) ? getSeriesColor(s.id) : '';
          return `<button class="chip ${active}" data-id="${s.id}"
            style="${color ? 'background:'+color+';border-color:'+color : ''}"
            >${s.label}</button>`;
        }).join('')}
      </div>
    </div>
  `).join('');

  container.querySelectorAll('.chip').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      if (selectedSeries.has(id)) {
        selectedSeries.delete(id);
      } else {
        selectedSeries.add(id);
      }
      renderSeriesSelector();
      loadCompare(cmpRange);
    });
  });
}

function getSeriesColor(id) {
  const idx = [...selectedSeries].indexOf(id);
  return CMP_COLORS[idx % CMP_COLORS.length];
}

async function loadCompare(range) {
  if (selectedSeries.size === 0) {
    if (cmpChart) { cmpChart.destroy(); cmpChart = null; }
    return;
  }
  const seriesParam = [...selectedSeries].join(',');
  const raw = await fetch(`/api/compare?series=${encodeURIComponent(seriesParam)}&range=${range}`).then(r => r.json());

  const hasTempOnly = raw.every(s => s.unit === '°C');
  const hasHumOnly  = raw.every(s => s.unit === '%');
  const hasBoth     = !hasTempOnly && !hasHumOnly;

  const datasets = raw.map((s, i) => {
    const color = CMP_COLORS[i % CMP_COLORS.length];
    const meta  = allSeriesMeta.find(m => m.id === s.id) || {};
    return {
      label: meta.label || s.id,
      data: s.data.map(p => ({x: p.t, y: p.v})),
      borderColor: color,
      backgroundColor: 'transparent',
      borderWidth: 2, pointRadius: 0, tension: 0.3,
      yAxisID: (hasBoth && s.unit === '%') ? 'y1' : 'y',
    };
  });

  const scales = {
    x: timeXAxis(range),
    y: {
      position: 'left',
      ticks: { color: '#8892a4', callback: v => hasBoth || hasTempOnly ? v + ' °C' : v + ' %' },
      grid: { color: '#2a2d3a' },
    },
  };
  if (hasBoth) {
    scales.y.ticks.callback = v => v + ' °C';
    scales.y1 = {
      position: 'right',
      ticks: { color: '#8892a4', callback: v => v + ' %' },
      grid: { drawOnChartArea: false },
    };
  } else if (hasHumOnly) {
    scales.y.ticks.callback = v => v + ' %';
  }

  const ctx = document.getElementById('cmp-chart').getContext('2d');
  if (cmpChart) cmpChart.destroy();
  cmpChart = new Chart(ctx, {
    type: 'line',
    data: {datasets},
    options: {
      scales,
      plugins: { legend: { labels: { color: '#8892a4', boxWidth: 12, font: {size: 11} } } },
      interaction: { mode: 'index', intersect: false },
    }
  });
}

async function loadRoomsCurrent() {
  const data = await fetch('/api/rooms/current').then(r => r.json());
  const grid = document.getElementById('rooms-grid');
  grid.innerHTML = '';
  Object.entries(data).sort((a,b) => a[0].localeCompare(b[0])).forEach(([room, v]) => {
    const t = v.temp !== null ? v.temp.toFixed(1) + ' °C' : '—';
    const h = v.hum  !== null ? v.hum.toFixed(0) + ' %' : '';
    const htg = v.heating === 1 ? ' <span style="color:var(--warm);font-size:.7rem;">● heiz</span>' : '';
    grid.innerHTML += `<div class="card"><div class="room">${room}${htg}</div><div class="temp">${t}</div><div class="hum">${h}</div></div>`;
  });
}

async function loadRoomsHistory(range) {
  const data = await fetch(`/api/rooms/history?range=${range}`).then(r => r.json());
  const ctx = document.getElementById('room-chart').getContext('2d');
  const entries = Object.entries(data);
  const datasets = entries.map(([room, pts], i) => ({
    label: room,
    data: pts.map(p => ({x: p.t, y: p.v})),
    borderColor: ROOM_COLORS[i % ROOM_COLORS.length],
    backgroundColor: 'transparent',
    borderWidth: 1.5, pointRadius: 0, tension: 0.3,
  }));
  if (roomChart) roomChart.destroy();
  roomChart = new Chart(ctx, {
    type: 'line',
    data: {datasets},
    options: {
      scales: {
        x: timeXAxis(range),
        y: { ticks: { color: '#8892a4', callback: v => v + ' °C' }, grid: { color: '#2a2d3a' } }
      },
      plugins: { legend: { labels: { color: '#8892a4', boxWidth: 12, font: {size: 11} } } },
      interaction: { mode: 'index', intersect: false },
    }
  });
}

function _watt(v) { return v !== null && v !== undefined ? (v >= 1000 ? (v/1000).toFixed(1)+' kW' : Math.round(v)+' W') : '—'; }
function _pct(v)  { return v !== null && v !== undefined ? v.toFixed(0)+' %' : '—'; }

async function loadEnergieCurrent() {
  const data = await fetch('/api/energie/current').then(r => r.json());
  const grid = document.getElementById('energie-grid');
  const items = [
    {k:'pv_w',        label:'PV Erzeugung',    fmt:_watt, cls:'e-pv'},
    {k:'verbrauch_w', label:'Verbrauch',        fmt:_watt, cls:'e-last'},
    {k:'bezug_w',     label:'Netzbezug',        fmt:_watt, cls:'e-bezug'},
    {k:'einspeisung_w',label:'Einspeisung',     fmt:_watt, cls:'e-einsp'},
    {k:'laden_w',     label:'Batterie laden',   fmt:_watt, cls:'e-laden'},
    {k:'entladen_w',  label:'Batterie entladen',fmt:_watt, cls:'e-entladen'},
    {k:'autonomie_pct',label:'Autarkie',        fmt:_pct,  cls:''},
    {k:'eigenverbrauch_pct',label:'Eigenverbrauch',fmt:_pct,cls:''},
  ];
  grid.innerHTML = items.map(({k, label, fmt, cls}) =>
    `<div class="vent-card ${cls}"><div class="label">${label}</div><div class="val">${fmt(data[k])}</div></div>`
  ).join('');
}

async function loadEnergieHistory(range) {
  const data = await fetch(`/api/energie/history?range=${range}`).then(r => r.json());
  const ctx = document.getElementById('energie-chart').getContext('2d');
  const datasets = ENERGIE_CHART_FIELDS.filter(f => data[f]?.length).map(f => ({
    label: ENERGIE_LABELS[f],
    data: data[f].map(p => ({x: p.t, y: p.v})),
    borderColor: ENERGIE_COLORS[f],
    backgroundColor: 'transparent',
    borderWidth: 2, pointRadius: 0, tension: 0.3,
  }));
  if (energieChart) energieChart.destroy();
  energieChart = new Chart(ctx, {
    type: 'line',
    data: {datasets},
    options: {
      scales: {
        x: timeXAxis(range),
        y: { ticks: { color: '#8892a4', callback: v => v >= 1000 ? (v/1000).toFixed(1)+' kW' : v+' W' }, grid: { color: '#2a2d3a' } }
      },
      plugins: { legend: { labels: { color: '#8892a4', boxWidth: 12, font: {size: 11} } } },
      interaction: { mode: 'index', intersect: false },
    }
  });
}

async function loadVerbraucherCurrent() {
  const data = await fetch('/api/verbraucher/current').then(r => r.json());
  const grid = document.getElementById('verbraucher-grid');
  const fields = _sortVerbraucher(Object.keys(data));
  grid.innerHTML = fields.map(f => {
    const v = data[f];
    const on = v !== null && v !== undefined && v > 0;
    const val = (v !== null && v !== undefined) ? (on ? 'AN' : 'AUS') : '—';
    return `<div class="vent-card ${on ? 'active' : ''}"><div class="label">${_verbraucherLabel(f)}</div><div class="val">${val}</div></div>`;
  }).join('');
}

async function loadVerbraucherHistory(range) {
  const data = await fetch(`/api/verbraucher/history?range=${range}`).then(r => r.json());
  const ctx = document.getElementById('verbraucher-chart').getContext('2d');
  const fields = _sortVerbraucher(Object.keys(data).filter(f => data[f]?.length));
  const datasets = fields.map((f, i) => ({
    label: _verbraucherLabel(f),
    data: data[f].map(p => ({x: p.t, y: p.v})),
    borderColor: VERBRAUCHER_COLOR_POOL[i % VERBRAUCHER_COLOR_POOL.length],
    backgroundColor: 'transparent',
    borderWidth: 2, pointRadius: 0, tension: 0, stepped: true,
  }));
  if (verbraucherChart) verbraucherChart.destroy();
  verbraucherChart = new Chart(ctx, {
    type: 'line',
    data: {datasets},
    options: {
      scales: {
        x: timeXAxis(range),
        y: { min: 0, max: 1, ticks: { color: '#8892a4', stepSize: 1, callback: v => v === 1 ? 'AN' : 'AUS' }, grid: { color: '#2a2d3a' } }
      },
      plugins: { legend: { labels: { color: '#8892a4', boxWidth: 12, font: {size: 11} } } },
      interaction: { mode: 'index', intersect: false },
    }
  });
}

async function loadCool24Current() {
  const data = await fetch('/api/comfoclime/current').then(r => r.json());
  const grid = document.getElementById('cool24-grid');
  const modeMap = {0: ['AUS', '#64748b'], 1: ['HEIZEN', '#f97316'], 2: ['KÜHLEN', '#22d3ee']};
  const [modeLabel, modeColor] = data.mode !== null ? (modeMap[data.mode] || ['?', '#8892a4']) : ['—', '#8892a4'];
  const items = [
    {label: 'Modus', val: `<span style="color:${modeColor};font-weight:700">${modeLabel}</span>`, sub: data.set_point_temp_c !== null ? 'Soll: '+data.set_point_temp_c.toFixed(1)+' °C' : ''},
    {label: 'Innenraum',       val: data.indoor_temp_c  !== null ? data.indoor_temp_c.toFixed(1)+' °C'  : '—', sub: ''},
    {label: 'Außen',           val: data.outdoor_temp_c !== null ? data.outdoor_temp_c.toFixed(1)+' °C' : '—', sub: ''},
    {label: 'TPMA',            val: data.tpma_temp_c    !== null ? data.tpma_temp_c.toFixed(1)+' °C'    : '—', sub: ''},
    {label: 'Zuluft (nach WP)',val: data.supply_temp_c  !== null ? data.supply_temp_c.toFixed(1)+' °C'  : '—', sub: ''},
    {label: 'Abluft',          val: data.exhaust_temp_c !== null ? data.exhaust_temp_c.toFixed(1)+' °C' : '—', sub: ''},
    {label: 'Leistung',        val: data.power_w !== null ? _watt(data.power_w) : '—', sub: data.power_pct !== null ? data.power_pct.toFixed(0)+' %' : ''},
  ];
  grid.innerHTML = items.map(({label, val, sub}) =>
    `<div class="vent-card"><div class="label">${label}</div><div class="val">${val}</div>${sub ? '<div class="sub">'+sub+'</div>' : ''}</div>`
  ).join('');
}

async function loadCool24History(range) {
  const data = await fetch(`/api/comfoclime/history?range=${range}`).then(r => r.json());
  const ctx = document.getElementById('cool24-chart').getContext('2d');
  const datasets = COOL24_TEMP_FIELDS.filter(f => data[f]?.length).map(f => ({
    label: COOL24_LABELS[f],
    data: data[f].map(p => ({x: p.t, y: p.v})),
    borderColor: COOL24_COLORS[f],
    backgroundColor: 'transparent',
    borderWidth: 2, pointRadius: 0, tension: 0.3,
  }));
  if (cool24Chart) cool24Chart.destroy();
  cool24Chart = new Chart(ctx, {
    type: 'line',
    data: {datasets},
    options: {
      scales: {
        x: timeXAxis(range),
        y: { ticks: { color: '#8892a4', callback: v => v + ' °C' }, grid: { color: '#2a2d3a' } }
      },
      plugins: { legend: { labels: { color: '#8892a4', boxWidth: 12, font: {size: 11} } } },
      interaction: { mode: 'index', intersect: false },
    }
  });
}

async function loadVentCurrent() {
  const data = await fetch('/api/ventilation/current').then(r => r.json());
  const grid = document.getElementById('vent-grid');
  grid.innerHTML = '';
  ['aussenluft','zuluft','abluft','fortluft'].forEach(stream => {
    const v = data[stream] || {};
    const t = v.temp !== null && v.temp !== undefined ? v.temp.toFixed(1) + ' °C' : '—';
    const h = v.hum  !== null && v.hum !== undefined  ? v.hum.toFixed(0) + ' %' : '';
    grid.innerHTML += `<div class="vent-card stream-${stream}"><div class="label">${VENT_LABELS[stream] || stream}</div><div class="val">${t}</div><div class="sub">${h}</div></div>`;
  });
}

async function loadVentHistory(range) {
  const data = await fetch(`/api/ventilation/history?range=${range}`).then(r => r.json());
  const ctx = document.getElementById('vent-chart').getContext('2d');
  const datasets = Object.entries(data).map(([stream, pts]) => ({
    label: VENT_LABELS[stream] || stream,
    data: pts.map(p => ({x: p.t, y: p.v})),
    borderColor: VENT_COLORS[stream] || '#aaa',
    backgroundColor: 'transparent',
    borderWidth: 2, pointRadius: 0, tension: 0.3,
  }));
  if (ventChart) ventChart.destroy();
  ventChart = new Chart(ctx, {
    type: 'line',
    data: {datasets},
    options: {
      scales: {
        x: timeXAxis(range),
        y: { ticks: { color: '#8892a4', callback: v => v + ' °C' }, grid: { color: '#2a2d3a' } }
      },
      plugins: { legend: { labels: { color: '#8892a4', boxWidth: 12, font: {size: 11} } } },
      interaction: { mode: 'index', intersect: false },
    }
  });
}

function setupRangeBtns(containerId, onSelect) {
  document.getElementById(containerId).querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.getElementById(containerId).querySelectorAll('button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      onSelect(btn.dataset.r);
    });
  });
}

function exportChart(fmt) {
  const canvas = document.getElementById('cmp-chart');
  const link = document.createElement('a');
  if (fmt === 'png') {
    link.download = 'vergleich.png';
    link.href = canvas.toDataURL('image/png');
  } else {
    const w = canvas.width, h = canvas.height;
    const img = canvas.toDataURL('image/png');
    const svg = `<?xml version="1.0" encoding="UTF-8"?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><image xlink:href="${img}" x="0" y="0" width="${w}" height="${h}"/></svg>`;
    link.download = 'vergleich.svg';
    link.href = URL.createObjectURL(new Blob([svg], {type: 'image/svg+xml'}));
    setTimeout(() => URL.revokeObjectURL(link.href), 1000);
  }
  link.click();
}

setupRangeBtns('room-range',         r => { roomRange         = r; loadRoomsHistory(r); });
setupRangeBtns('vent-range',         r => { ventRange         = r; loadVentHistory(r); });
setupRangeBtns('energie-range',      r => { energieRange      = r; loadEnergieHistory(r); });
setupRangeBtns('verbraucher-range',  r => { verbraucherRange  = r; loadVerbraucherHistory(r); });
setupRangeBtns('cool24-range',       r => { cool24Range       = r; loadCool24History(r); });
setupRangeBtns('cmp-range',          r => { cmpRange          = r; loadCompare(r); });

async function refresh() {
  await Promise.all([loadRoomsCurrent(), loadVentCurrent(), loadEnergieCurrent(), loadVerbraucherCurrent(), loadCool24Current()]);
  document.getElementById('updated').textContent = 'Aktualisiert: ' + new Date().toLocaleTimeString('de-DE');
}

refresh();
loadRoomsHistory(roomRange);
loadEnergieHistory(energieRange);
loadVerbraucherHistory(verbraucherRange);
loadCool24History(cool24Range);
loadVentHistory(ventRange);
loadSeriesMeta();
setInterval(() => {
  refresh();
  loadRoomsHistory(roomRange);
  loadEnergieHistory(energieRange);
  loadVerbraucherHistory(verbraucherRange);
  loadCool24History(cool24Range);
  loadVentHistory(ventRange);
  loadCompare(cmpRange);
}, 60000);
</script>
